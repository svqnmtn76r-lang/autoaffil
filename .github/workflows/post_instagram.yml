name: Post to Instagram

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 平日 UTC 03:00 = US West 19:00 / AEST 13:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and Post to Instagram
        env:
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCOUNT_ID:          ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          GOOGLE_SHEETS_CREDS:           ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SPREADSHEET_ID:                ${{ secrets.SPREADSHEET_ID }}
        run: python main_runner.py --platform instagram
